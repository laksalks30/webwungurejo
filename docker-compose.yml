version: '3.8'

services:
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    ports:
      - "8067:8067"
    volumes:
      - ./backend/database.db:/app/database.db
      - ./backend/uploads:/app/uploads
    environment:
      - ADMIN_USERNAME=${ADMIN_USERNAME:-admin}
      - ADMIN_PASSWORD=${ADMIN_PASSWORD:-admin123}
      - SECRET_KEY=${SECRET_KEY:-kkn_super_secret_key_change_me_in_production}
    restart: always

  cloudflared:
    image: cloudflare/cloudflared:latest
    command: tunnel --no-autoupdate run --token eyJhIjoiZGEyMTRiNWVkMjZiOWNlMDEwOWFlMmY1NmY2Y2Q1ODMiLCJ0IjoiZWM3MTJiOTUtMWZiMC00MWU3LWJhNmMtYjc5YmRlMzBjMWNjIiwicyI6Ik5XWTJNakkxTnpFdE5HRXlOQzAwT1RNNUxUZzBNakl0TkRsbFpUTmpNamhpTjJJeSJ9
    restart: always
    depends_on:
      - backend
